<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KYC Form - Address & Income</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
 </head>
 <body>
   <div class="wrapper">
        <div class="form-card">
         <div class="steps">
         <div class="step done">
          IDENTITY
         </div>
         <div class="step active">
           2 · ADDRESS & INCOME
         </div>
         <div class="step">
            3 · DOCUMENTS
         </div>
        </div>
        <div class="progress progress-custom">
          <div class="progress-bar progress-green"style="width:66%;">
          </div>
        </div>
        <form action="documents.html">
          <div class="mb-4">
           <input type="text"class="form-control custom-input"placeholder="House No. / Street Address"required>
          </div>
          <div class="mb-4">
           <input type="text"class="form-control custom-input"placeholder="City"required>
          </div>
          <div class="mb-4">
            <select class="form-select custom-input" required>
            <option selected disabled>
              Select State
             </option>
             <option>Andhra Pradesh</option>
             <option>Delhi</option>
             <option>Gujarat</option>
             <option>Haryana</option>
             <option>Karnataka</option>
             <option>Maharashtra</option>
             <option>Punjab</option>
             <option>Rajasthan</option>
             <option>Tamil Nadu</option>
             <option>Uttar Pradesh</option>
             <option>West Bengal</option>
            </select>
          </div>
          <div class="mb-4">
           <input type="text"class="form-control custom-input"placeholder="Pincode"maxlength="6"pattern="[0-9]{6}"required>
          </div>
          <label class="field-label">
           Monthly Income
          </label>
          <input type="range"class="form-range mb-2"min="10000"max="500000"step="5000">
          <div class="d-flex justify-content-between mb-4">
           <small>₹10,000</small>
           <small>₹5,00,000</small>
          </div>
          <label class="field-label">
           Employment Type
          </label>
          <div class="form-check">
           <input class="form-check-input"type="radio"name="employment"checked>
            <label class="form-check-label">
             Salaried
            </label>
          </div>
          <div class="form-check">
           <input class="form-check-input"type="radio"name="employment">
            <label class="form-check-label">
             Self Employed
            </label>
          </div>
          <div class="form-check mb-4">
           <input class="form-check-input"type="radio"name="employment">
            <label class="form-check-label">
             Student
            </label>
          </div>
          <div class="btn-row">
           <a href="index.html"class="btn btn-back">Back</a>
           <a href="documents.html">Continue</a>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
