<!DOCTYPE html>
<html lang="en">
 <head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>KYC Form - Documents</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="style.css">
 </head>
 <body>
   <div class="wrapper">
    <div class="form-card">
     <div class="steps">
      <div class="step done">
        IDENTITY
      </div>
        <div class="step done">
         ADDRESS & INCOME
        </div>
        <div class="step active">
          3 · DOCUMENTS
        </div>
    </div>
    <div class="progress progress-custom">
     <div class="progress-bar progress-green"style="width:100%;">
     </div>
    </div>
    <form action="success.html">
      <h5 class="mb-4 fw-bold">Upload Required Documents</h5>
      <div class="mb-4">
        <label class="field-label">
         Aadhaar Card
        </label>
        <input type="file"class="form-control custom-input"accept=".jpg,.jpeg,.png,.pdf"required>
      </div>
      <div class="mb-4">
      <label class="field-label">
      PAN Card
      </label>
      <input type="file"class="form-control custom-input"accept=".jpg,.jpeg,.png,.pdf"required>
     </div>
     <div class="mb-4">
      <label class="field-label">
        Live Selfie
      </label>
      <input type="file"class="form-control custom-input"accept=".jpg,.jpeg,.png"required>
     </div>
     <div class="form-check mb-4">
      <input class="form-check-input"type="checkbox"required>
      <label class="form-check-label">
        I confirm that all the uploaded documents are genuine.
      </label>
     </div>
      <div class="btn-row">
      <a href="address.html"class="btn btn-back">Back</a>
      <button type="submit"class="btn btn-continue">Final Submit</button>
     </div>
    </form>
   </div>
  </div>
 </body>
</html>
